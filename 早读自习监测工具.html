<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早读自习监测工具 🌟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: radial-gradient(ellipse at center, #1a0a3e 0%, #0a0614 60%, #000208 100%);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    color: #fff;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 47% 28%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 95%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 75% 48%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 12%, rgba(255,255,255,0.9) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 22%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 42%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 50% 92%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 8% 30%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 72%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 67% 5%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 18% 58%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 52%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 53% 18%, rgba(255,255,255,0.6) 0%, transparent 100%);
    animation: starfield 120s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes starfield {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(0.1deg); }
    100% { transform: translateY(0) rotate(0deg); }
  }

  /* ============================================================
     TOP CONTROLS
     ============================================================ */
  #topControls {
    position: fixed;
    top: 0;
    right: 20px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    background: rgba(0,0,0,0.4);
    padding: 0 16px;
    border-radius: 0 0 12px 12px;
  }

  #topControls button {
    font-size: 16px;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
  }

  #topControls button:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.5);
    transform: scale(1.05);
  }

  #topControls button:active {
    transform: scale(0.97);
  }

  /* ============================================================
     TASK TITLE
     ============================================================ */
  #taskTitleBar {
    position: fixed;
    top: 60px;
    left: 0;
    right: 0;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
  }

  #taskTitle {
    font-size: 48px;
    font-weight: 900;
    color: #fde68a;
    text-shadow: 0 0 30px rgba(253,230,138,0.9), 0 0 60px rgba(253,230,138,0.4), 0 4px 0 rgba(0,0,0,0.5);
    background: transparent;
    border: none;
    border-bottom: 2px dashed rgba(253,230,138,0.3);
    width: 70%;
    text-align: center;
    outline: none;
    font-family: inherit;
    caret-color: #fde68a;
  }

  #taskTitle::placeholder {
    color: rgba(253,230,138,0.4);
  }

  /* ============================================================
     STAR GRID
     ============================================================ */
  #starGrid {
    position: fixed;
    top: 140px;
    left: 0;
    right: 0;
    bottom: 100px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    grid-auto-rows: 90px;
    align-content: start;
    padding: 20px;
    gap: 12px;
    overflow: hidden;
    z-index: 10;
  }

  .star-cell {
    font-size: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation:
      popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both,
      starBounce var(--dur, 2.5s) ease-in-out var(--delay, 0s) infinite;
    cursor: default;
    user-select: none;
  }

  @keyframes starBounce {
    0%, 100% {
      transform: scale(1) rotate(-8deg) translateY(0);
      filter: drop-shadow(0 0 12px #fbbf24);
    }
    25% {
      transform: scale(1.2) rotate(5deg) translateY(-8px);
      filter: drop-shadow(0 0 25px #f59e0b);
    }
    50% {
      transform: scale(0.95) rotate(-3deg) translateY(2px);
      filter: drop-shadow(0 0 8px #fbbf24);
    }
    75% {
      transform: scale(1.1) rotate(8deg) translateY(-4px);
      filter: drop-shadow(0 0 20px #fcd34d);
    }
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes popOut {
    to { transform: scale(0) rotate(20deg); opacity: 0; }
  }

  /* ============================================================
     dB BALL
     ============================================================ */
  #dbBall {
    position: fixed;
    right: 40px;
    bottom: 120px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.15), rgba(0,0,0,0.8));
    border: 6px solid #4ade80;
    box-shadow: 0 0 40px rgba(74,222,128,0.7), 0 0 80px rgba(74,222,128,0.3), inset 0 0 30px rgba(74,222,128,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  #dbBall.bad {
    border-color: #ef4444;
    box-shadow: 0 0 40px rgba(239,68,68,0.7), 0 0 80px rgba(239,68,68,0.3), inset 0 0 30px rgba(239,68,68,0.1);
  }

  #dbBall.running {
    animation: dbPulse 1.5s ease-in-out infinite;
  }

  #dbBall.idle {
    opacity: 0.5;
  }

  @keyframes dbPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  #dbNumber {
    font-size: 56px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px currentColor;
    line-height: 1;
  }

  #dbLabel {
    font-size: 20px;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* ============================================================
     STATUS MESSAGE
     ============================================================ */
  #statusMsg {
    position: fixed;
    bottom: 108px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 26px;
    font-weight: 800;
    padding: 10px 32px;
    border-radius: 30px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    color: #4ade80;
    text-shadow: 0 0 15px rgba(74,222,128,0.8);
    z-index: 50;
    white-space: nowrap;
    transition: color 0.3s, text-shadow 0.3s;
  }

  #statusMsg.bad {
    color: #f87171;
    text-shadow: 0 0 15px rgba(248,113,113,0.8);
    animation: statusPulse 0.6s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ============================================================
     SCREEN ALERT
     ============================================================ */
  body.alerting {
    box-shadow: inset 0 0 0 8px #ef4444, inset 0 0 100px rgba(239,68,68,0.5);
    animation: screenAlert 0.6s ease-in-out infinite;
  }

  @keyframes screenAlert {
    0%, 100% {
      box-shadow: inset 0 0 0 8px #ef4444, inset 0 0 100px rgba(239,68,68,0.5);
    }
    50% {
      box-shadow: inset 0 0 0 12px #ef4444, inset 0 0 160px rgba(239,68,68,0.7);
    }
  }

  /* ============================================================
     BOTTOM BAR
     ============================================================ */
  #bottomBar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: linear-gradient(to top, rgba(5,0,20,0.98), rgba(5,0,20,0.8));
    border-top: 2px solid rgba(74,222,128,0.4);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 60px;
    z-index: 50;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-label {
    font-size: 22px;
    color: rgba(255,255,255,0.7);
  }

  .stat-value {
    font-size: 44px;
    font-weight: 900;
    color: #fbbf24;
    line-height: 1;
    text-shadow: 0 0 20px rgba(251,191,36,0.6);
  }

  .timer-val {
    font-size: 40px;
    font-variant-numeric: tabular-nums;
  }

  /* ============================================================
     FLOAT TEXT
     ============================================================ */
  .float-text {
    position: fixed;
    font-size: 28px;
    font-weight: 900;
    color: #fbbf24;
    text-shadow: 0 0 15px gold;
    pointer-events: none;
    z-index: 200;
    animation: floatUp 0.8s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
  }

  /* ============================================================
     SETTINGS DRAWER
     ============================================================ */
  #drawerOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
  }

  #drawerOverlay.open {
    display: block;
  }

  #settingsDrawer {
    position: fixed;
    top: 0;
    right: -320px;
    width: 300px;
    height: 100vh;
    background: rgba(10,5,30,0.97);
    border-left: 1px solid rgba(74,222,128,0.3);
    z-index: 301;
    transition: right 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    padding: 30px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  #settingsDrawer.open {
    right: 0;
  }

  .drawer-title {
    font-size: 26px;
    font-weight: 900;
    color: #fde68a;
    text-shadow: 0 0 20px rgba(253,230,138,0.6);
  }

  .drawer-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .drawer-section-label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .mode-buttons {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    flex: 1;
    padding: 12px 8px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    transition: all 0.2s;
    text-align: center;
    line-height: 1.4;
  }

  .mode-btn.active {
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 0 20px rgba(124,58,237,0.5);
  }

  .drawer-slider-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .slider-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    color: rgba(255,255,255,0.8);
  }

  .slider-val {
    font-size: 22px;
    font-weight: 900;
    color: #4ade80;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #7c3aed;
    cursor: pointer;
  }

  .drawer-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    color: rgba(255,255,255,0.8);
  }

  .drawer-input-row input[type="number"] {
    width: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(74,222,128,0.4);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    outline: none;
  }

  .mode-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    border-left: 3px solid rgba(124,58,237,0.5);
  }

  .drawer-close-btn {
    margin-top: auto;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .drawer-close-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  /* ============================================================
     RESULT POPUP
     ============================================================ */
  #resultOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    z-index: 400;
    align-items: center;
    justify-content: center;
  }

  #resultOverlay.open {
    display: flex;
  }

  #resultCard {
    background: rgba(10,5,30,0.97);
    border: 2px solid rgba(253,230,138,0.4);
    border-radius: 28px;
    padding: 48px 52px;
    min-width: 520px;
    max-width: 680px;
    box-shadow: 0 0 80px rgba(253,230,138,0.15), 0 0 160px rgba(124,58,237,0.15);
    text-align: center;
    position: relative;
    z-index: 401;
  }

  .result-emoji {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 12px;
    display: block;
    animation: resultBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes resultBounce {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title {
    font-size: 36px;
    font-weight: 900;
    color: #fde68a;
    text-shadow: 0 0 30px rgba(253,230,138,0.8);
    margin-bottom: 8px;
  }

  .result-encourage {
    font-size: 18px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .result-stat {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    padding: 16px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .result-stat-label {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }

  .result-stat-value {
    font-size: 32px;
    font-weight: 900;
    color: #fbbf24;
  }

  .result-again-btn {
    padding: 16px 48px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 0 30px rgba(124,58,237,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .result-again-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 50px rgba(124,58,237,0.7);
  }

  /* ============================================================
     CONFETTI
     ============================================================ */
  .confetti-particle {
    position: fixed;
    pointer-events: none;
    z-index: 500;
    border-radius: 2px;
    animation: confettiFall var(--dur, 3s) ease-in var(--delay, 0s) forwards;
  }

  @keyframes confettiFall {
    0% {
      transform: translateY(var(--startY)) translateX(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(100vh) translateX(var(--driftX)) rotate(var(--rot, 720deg));
      opacity: 0;
    }
  }
</style>
</head>
<body>

<!-- TOP CONTROLS -->
<div id="topControls">
  <button onclick="openDrawer()">⚙️ 设置</button>
  <button onclick="startSession()">▶ 开始</button>
  <button onclick="togglePause()">⏸ 暂停</button>
  <button onclick="resetSession()">↺ 重置</button>
</div>

<!-- TASK TITLE -->
<div id="taskTitleBar">
  <input type="text" id="taskTitle" value="✨ 今日早读任务" placeholder="输入今日任务..." />
</div>

<!-- STAR GRID -->
<div id="starGrid"></div>

<!-- dB BALL -->
<div id="dbBall" class="idle">
  <div id="dbNumber">--</div>
  <div id="dbLabel">dB</div>
</div>

<!-- STATUS MESSAGE -->
<div id="statusMsg">🌟 点击"开始"，收集满天星辰！</div>

<!-- BOTTOM BAR -->
<div id="bottomBar">
  <div class="stat-item">
    <div class="stat-label">✨ 能量星</div>
    <div class="stat-value" id="statStars">0 颗</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">⭐ 总积分</div>
    <div class="stat-value" id="statScore">0 分</div>
  </div>
  <div class="stat-item">
    <div class="stat-label">⏱ 倒计时</div>
    <div class="stat-value timer-val" id="statTimer">--:--</div>
  </div>
</div>

<!-- SETTINGS DRAWER OVERLAY -->
<div id="drawerOverlay" onclick="closeDrawer()"></div>
<div id="settingsDrawer">
  <div class="drawer-title">⚙️ 设置</div>

  <div class="drawer-section">
    <div class="drawer-section-label">监测模式</div>
    <div class="mode-buttons">
      <button class="mode-btn active" id="modeQuietBtn" onclick="setMode('quiet')">🤫 安静模式</button>
      <button class="mode-btn" id="modeReadingBtn" onclick="setMode('reading')">📢 朗读模式</button>
    </div>
    <div class="mode-desc" id="modeDesc">安静模式：鼓励小朋友保持安静，噪音越少，星星越多！适合自习、测验时使用。</div>
  </div>

  <div class="drawer-section">
    <div class="drawer-section-label">噪音阈值</div>
    <div class="drawer-slider-row">
      <div class="slider-label-row">
        <span>声音界限</span>
        <span class="slider-val" id="thresholdVal">45 dB</span>
      </div>
      <input type="range" id="thresholdSlider" min="20" max="90" value="45" oninput="updateThreshold(this.value)">
    </div>
  </div>

  <div class="drawer-section">
    <div class="drawer-section-label">时长设置</div>
    <div class="drawer-input-row">
      <input type="number" id="durationInput" value="10" min="1" max="60" onchange="updateDuration(this.value)">
      <span>分钟</span>
    </div>
  </div>

  <button class="drawer-close-btn" onclick="closeDrawer()">✓ 关闭设置</button>
</div>

<!-- RESULT OVERLAY -->
<div id="resultOverlay">
  <div id="resultCard">
    <span class="result-emoji" id="resultEmoji">🏆</span>
    <div class="result-title" id="resultTitle">太棒了！</div>
    <div class="result-encourage" id="resultEncourage">你们今天表现超级棒！</div>
    <div class="result-grid">
      <div class="result-stat">
        <div class="result-stat-label">⭐ 获得积分</div>
        <div class="result-stat-value" id="resScore">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">✨ 能量星</div>
        <div class="result-stat-value" id="resStars">0</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">😊 表现指数</div>
        <div class="result-stat-value" id="resGoodPct">0%</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-label">⏱ 持续时长</div>
        <div class="result-stat-value" id="resDuration">0分</div>
      </div>
    </div>
    <button class="result-again-btn" onclick="closeResult()">🌟 再来一次</button>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & STATE
// ============================================================
const SCORE_PER_STAR = 80;
const LOGIC_FRAMES = 20;

let globalScore = 0;
let starElements = [];
let logicFrame = 0;
let pendingGood = 0;
let pendingFrames = 0;
let mode = 'quiet';
let threshold = 45;
let running = false;
let paused = false;
let remainingSec = 0;
let durationSec = 600;
let timerInterval = null;
let animFrame = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let dataArray = null;
let bufferLength = 0;
let totalFrames = 0;
let goodFrames = 0;
let sessionStartSec = 0;
let lastDbIsGood = true;

const STAR_EMOJIS = ['⭐', '🌟', '💫', '✨'];

const STATUS_MSGS = {
  quiet_good:   '🤫 太棒了！保持安静，星星在增加～',
  quiet_bad:    '⚠️ 有噪音！星星要消失了！快安静！',
  reading_good: '📢 读得响亮！星星快速增加！',
  reading_bad:  '🔇 声音太小！大声读出来！',
  idle:         '🌟 点击"开始"，收集满天星辰！',
  paused:       '⏸ 已暂停，点击继续'
};

// ============================================================
// AUDIO
// ============================================================
async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    micStream = stream;
    const source = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.4;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    source.connect(analyser);
    return true;
  } catch (e) {
    alert('无法访问麦克风：' + e.message + '\n\n请允许浏览器使用麦克风，然后刷新页面重试。');
    return false;
  }
}

function getDb() {
  if (!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
  const avg = sum / bufferLength;
  return avg === 0 ? 0 : Math.max(0, 20 * Math.log10(avg / 255) + 90);
}

function stopAudio() {
  if (micStream) {
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }
  analyser = null;
  dataArray = null;
  bufferLength = 0;
}

// ============================================================
// MAIN RAF LOOP
// ============================================================
function loop() {
  if (!running || paused) {
    animFrame = null;
    return;
  }
  animFrame = requestAnimationFrame(loop);

  var db = getDb();
  updateDbBall(db);

  logicFrame++;
  totalFrames++;
  var above = db >= threshold;
  var isGood = (mode === 'quiet') ? !above : above;
  if (isGood) {
    pendingGood++;
    goodFrames++;
  }
  pendingFrames++;

  if (logicFrame % LOGIC_FRAMES === 0) {
    var ratio = pendingGood / pendingFrames;
    if (mode === 'quiet') {
      if (ratio >= 0.5) {
        globalScore += 5;
      } else {
        globalScore = Math.max(0, globalScore - 2);
      }
    } else {
      if (ratio >= 0.5) {
        globalScore += 5;
      }
    }
    pendingGood = 0;
    pendingFrames = 0;
    syncStars();
    updateStats();
  }

  updateStatusAndAlert(isGood);
  lastDbIsGood = isGood;
}

// ============================================================
// dB BALL
// ============================================================
function updateDbBall(db) {
  var ball = document.getElementById('dbBall');
  var numEl = document.getElementById('dbNumber');
  var above = db >= threshold;
  var isBad = (mode === 'quiet') ? above : !above;

  numEl.textContent = Math.round(db);
  ball.classList.remove('idle');

  if (isBad) {
    ball.classList.add('bad');
  } else {
    ball.classList.remove('bad');
  }
}

// ============================================================
// STATUS & ALERT
// ============================================================
function updateStatusAndAlert(isGood) {
  var msgEl = document.getElementById('statusMsg');
  if (isGood) {
    msgEl.textContent = STATUS_MSGS[mode + '_good'];
    msgEl.className = '';
    document.body.classList.remove('alerting');
  } else {
    msgEl.textContent = STATUS_MSGS[mode + '_bad'];
    msgEl.className = 'bad';
    document.body.classList.add('alerting');
  }
}

function setStatusIdle(msg) {
  var msgEl = document.getElementById('statusMsg');
  msgEl.textContent = msg;
  msgEl.className = '';
  document.body.classList.remove('alerting');
}

// ============================================================
// STARS
// ============================================================
function addStar() {
  var div = document.createElement('div');
  div.className = 'star-cell';
  div.textContent = STAR_EMOJIS[starElements.length % 4];
  var delay = (Math.random() * 3).toFixed(2);
  var dur = (2 + Math.random()).toFixed(2);
  div.style.setProperty('--delay', delay + 's');
  div.style.setProperty('--dur', dur + 's');
  div.style.animationDelay = delay + 's';
  div.style.animationDuration = dur + 's';
  document.getElementById('starGrid').appendChild(div);
  starElements.push(div);
  showFloatText(div);
}

function removeStar() {
  var div = starElements.pop();
  if (!div) return;
  div.style.animation = 'popOut 0.2s ease-in forwards';
  div.addEventListener('animationend', function() { div.remove(); }, { once: true });
}

function syncStars() {
  var target = Math.min(200, Math.floor(globalScore / SCORE_PER_STAR));
  while (starElements.length < target) addStar();
  while (starElements.length > target) removeStar();
}

function showFloatText(anchorEl) {
  // Defer one frame so element has layout
  requestAnimationFrame(function() {
    var rect = anchorEl.getBoundingClientRect();
    if (!rect.width) return;
    var el = document.createElement('div');
    el.className = 'float-text';
    el.textContent = '✨+1';
    el.style.left = (rect.left + rect.width / 2 - 30) + 'px';
    el.style.top = (rect.top - 10) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); }, { once: true });
  });
}

function clearStars() {
  starElements.forEach(function(s) { s.remove(); });
  starElements = [];
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  var starsCount = Math.floor(globalScore / SCORE_PER_STAR);
  document.getElementById('statStars').textContent = starsCount + ' 颗';
  document.getElementById('statScore').textContent = globalScore + ' 分';
}

function updateTimerDisplay() {
  if (remainingSec < 0) remainingSec = 0;
  var m = Math.floor(remainingSec / 60).toString().padStart(2, '0');
  var s = (remainingSec % 60).toString().padStart(2, '0');
  document.getElementById('statTimer').textContent = m + ':' + s;
}

// ============================================================
// TIMER
// ============================================================
function tickTimer() {
  if (!running || paused) return;
  remainingSec--;
  updateTimerDisplay();
  if (remainingSec <= 0) {
    endSession();
  }
}

// ============================================================
// SESSION CONTROL
// ============================================================
async function startSession() {
  if (running) return;

  if (!audioCtx) {
    var ok = await initAudio();
    if (!ok) return;
  }

  running = true;
  paused = false;
  globalScore = 0;
  totalFrames = 0;
  goodFrames = 0;
  logicFrame = 0;
  pendingGood = 0;
  pendingFrames = 0;
  remainingSec = durationSec;
  sessionStartSec = durationSec;
  lastDbIsGood = true;

  clearStars();
  updateStats();
  updateTimerDisplay();

  var ball = document.getElementById('dbBall');
  ball.classList.remove('idle');
  ball.classList.add('running');

  timerInterval = setInterval(tickTimer, 1000);
  loop();
}

function togglePause() {
  if (!running) return;

  if (paused) {
    // Resume
    paused = false;
    var ball = document.getElementById('dbBall');
    ball.classList.add('running');
    setStatusIdle(STATUS_MSGS[mode + '_good']);
    loop();
  } else {
    // Pause
    paused = true;
    if (animFrame) {
      cancelAnimationFrame(animFrame);
      animFrame = null;
    }
    var ball = document.getElementById('dbBall');
    ball.classList.remove('running');
    document.body.classList.remove('alerting');
    setStatusIdle(STATUS_MSGS.paused);
  }
}

function resetSession() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  running = false;
  paused = false;
  globalScore = 0;
  totalFrames = 0;
  goodFrames = 0;
  logicFrame = 0;
  pendingGood = 0;
  pendingFrames = 0;

  clearStars();
  updateStats();

  remainingSec = durationSec;
  updateTimerDisplay();

  var ball = document.getElementById('dbBall');
  ball.classList.add('idle');
  ball.classList.remove('bad', 'running');
  document.getElementById('dbNumber').textContent = '--';
  document.body.classList.remove('alerting');
  setStatusIdle(STATUS_MSGS.idle);
}

function endSession() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  running = false;
  paused = false;
  document.body.classList.remove('alerting');

  var ball = document.getElementById('dbBall');
  ball.classList.remove('running', 'bad');
  ball.classList.add('idle');

  setStatusIdle(STATUS_MSGS.idle);
  showResult();
}

// ============================================================
// RESULT POPUP
// ============================================================
function showResult() {
  var goodPct = totalFrames > 0 ? Math.round((goodFrames / totalFrames) * 100) : 0;
  var starsCount = Math.floor(globalScore / SCORE_PER_STAR);
  var usedSec = sessionStartSec - remainingSec;
  var usedMin = Math.max(1, Math.round(usedSec / 60));

  var emoji, title, encourage;
  if (goodPct >= 90) {
    emoji = '🏆';
    title = '完美表现！';
    encourage = '哇！你们今天简直太厉害了！老师为你们骄傲！🎉';
  } else if (goodPct >= 75) {
    emoji = '🌟';
    title = '非常棒！';
    encourage = '你们表现超级好！继续保持，会更出色的！⭐';
  } else if (goodPct >= 60) {
    emoji = '😊';
    title = '做得不错！';
    encourage = '今天做得挺好的！下次更加专注，星星会更多！';
  } else if (goodPct >= 40) {
    emoji = '💪';
    title = '继续加油！';
    encourage = '有进步的空间哦！下次我们一起努力，好不好？';
  } else {
    emoji = '🌱';
    title = '加油！小种子！';
    encourage = '没关系，慢慢来！每天进步一点点，你就是最棒的！';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultEncourage').textContent = encourage;
  document.getElementById('resScore').textContent = globalScore;
  document.getElementById('resStars').textContent = starsCount + ' 颗';
  document.getElementById('resGoodPct').textContent = goodPct + '%';
  document.getElementById('resDuration').textContent = usedMin + '分钟';

  document.getElementById('resultOverlay').classList.add('open');

  if (goodPct >= 70) {
    startConfetti();
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('open');
  stopConfetti();
  resetSession();
}

// ============================================================
// CONFETTI
// ============================================================
var CONFETTI_COLORS = [
  '#fbbf24', '#f87171', '#34d399', '#60a5fa', '#a78bfa',
  '#fb923c', '#f472b6', '#4ade80', '#38bdf8', '#e879f9',
  '#facc15', '#ff6b6b', '#00d2ff', '#7c3aed', '#ec4899'
];

var confettiParticles = [];

function startConfetti() {
  stopConfetti();
  for (var i = 0; i < 120; i++) {
    (function() {
      var el = document.createElement('div');
      el.className = 'confetti-particle';
      var color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      var startX = Math.random() * window.innerWidth;
      var startY = -20 - Math.random() * 200;
      var driftX = (Math.random() - 0.5) * 300;
      var dur = (2 + Math.random() * 2).toFixed(2);
      var delay = (Math.random() * 1.5).toFixed(2);
      var rot = Math.round(Math.random() * 720 + 360);
      var size = 8 + Math.floor(Math.random() * 8);
      var borderRadius = Math.random() > 0.5 ? '50%' : '2px';

      el.style.cssText = [
        'left:' + startX + 'px',
        'width:' + size + 'px',
        'height:' + size + 'px',
        'background:' + color,
        'border-radius:' + borderRadius,
        '--startY:' + startY + 'px',
        '--driftX:' + driftX + 'px',
        '--dur:' + dur + 's',
        '--delay:' + delay + 's',
        '--rot:' + rot + 'deg',
        'animation-duration:' + dur + 's',
        'animation-delay:' + delay + 's'
      ].join(';');

      document.body.appendChild(el);
      confettiParticles.push(el);
      el.addEventListener('animationend', function() {
        el.remove();
        confettiParticles = confettiParticles.filter(function(p) { return p !== el; });
      }, { once: true });
    })();
  }
}

function stopConfetti() {
  confettiParticles.forEach(function(p) { p.remove(); });
  confettiParticles = [];
}

// ============================================================
// SETTINGS DRAWER
// ============================================================
function openDrawer() {
  document.getElementById('settingsDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('settingsDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function setMode(m) {
  mode = m;
  document.getElementById('modeQuietBtn').classList.toggle('active', m === 'quiet');
  document.getElementById('modeReadingBtn').classList.toggle('active', m === 'reading');

  var descEl = document.getElementById('modeDesc');
  if (m === 'quiet') {
    descEl.textContent = '安静模式：鼓励小朋友保持安静，噪音越少，星星越多！适合自习、测验时使用。';
  } else {
    descEl.textContent = '朗读模式：鼓励小朋友大声朗读，声音越响亮，星星越多！适合早读、朗诵时使用。';
  }
}

function updateThreshold(val) {
  threshold = parseInt(val, 10);
  document.getElementById('thresholdVal').textContent = val + ' dB';
}

function updateDuration(val) {
  var mins = Math.max(1, Math.min(60, parseInt(val, 10) || 10));
  document.getElementById('durationInput').value = mins;
  durationSec = mins * 60;
  if (!running) {
    remainingSec = durationSec;
    updateTimerDisplay();
  }
}

// ============================================================
// INIT
// ============================================================
(function init() {
  remainingSec = durationSec;
  updateTimerDisplay();
  updateStats();
  setStatusIdle(STATUS_MSGS.idle);
  document.getElementById('thresholdVal').textContent = threshold + ' dB';
  document.getElementById('thresholdSlider').value = threshold;
})();
</script>
